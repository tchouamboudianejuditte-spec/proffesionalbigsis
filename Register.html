<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - EmpowerHer</title>
    <link rel="stylesheet" href="Styles/style.css" />
    <style>
      body {
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--secondary) 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
        padding: 20px;
      }

      .register-container {
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 450px;
      }

      .register-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .register-header h1 {
        margin: 0 0 8px 0;
        font-size: 1.8rem;
        color: var(--text);
      }

      .register-header p {
        margin: 0;
        color: var(--muted);
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.3s;
        box-sizing: border-box;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .form-row .form-group {
        margin-bottom: 0;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .password-requirements {
        background: var(--light);
        padding: 12px;
        border-radius: 6px;
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: -12px;
        margin-bottom: 20px;
      }

      .requirement {
        display: flex;
        gap: 8px;
        margin-bottom: 6px;
      }

      .requirement.met {
        color: var(--success);
      }

      .terms {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 24px;
        font-size: 0.85rem;
      }

      .terms input {
        margin-top: 3px;
        width: auto;
      }

      .terms a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }

      .terms a:hover {
        text-decoration: underline;
      }

      .signup-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(
          135deg,
          var(--primary) 0%,
          var(--primary-dark) 100%
        );
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
      }

      .signup-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
      }

      .divider {
        text-align: center;
        margin: 24px 0;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 45%;
        height: 1px;
        background: var(--border);
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      .divider span {
        background: #fff;
        padding: 0 12px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .oauth-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .oauth-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
        color: var(--text);
        font-size: 0.9rem;
      }

      .oauth-btn:hover {
        background: var(--light);
        border-color: var(--primary);
      }

      .oauth-btn img {
        width: 20px;
        height: 20px;
      }

      .login-link {
        text-align: center;
        margin-top: 24px;
        font-size: 0.9rem;
        color: var(--text);
      }

      .login-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }

      .login-link a:hover {
        text-decoration: underline;
      }

      /* RESPONSIVE */
      @media (max-width: 480px) {
        .register-container {
          padding: 24px;
        }

        .register-header h1 {
          font-size: 1.5rem;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <div class="register-header">
        <h1>Create Account</h1>
        <p>Join EmpowerHer and start your journey</p>
      </div>

      <form>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="First name" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Last name" required />
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a password" required />
          <div class="password-requirements">
            <div class="requirement"><span>✓</span> At least 8 characters</div>
            <div class="requirement">
              <span>✓</span> Contains uppercase letter
            </div>
            <div class="requirement"><span>✓</span> Contains number</div>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm your password" required />
        </div>

        <div class="form-group">
          <label>Career Interests</label>
          <select required>
            <option value="">Select your primary interest</option>
            <option value="tech">Technology</option>
            <option value="business">Business & Finance</option>
            <option value="design">Design & UX</option>
            <option value="marketing">Marketing</option>
            <option value="engineering">Engineering</option>
            <option value="product">Product Management</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="terms">
          <input type="checkbox" id="terms" required />
          <label for="terms">
            I agree to the <a href="#">Terms of Service</a> and
            <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="signup-btn">Create Account</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="oauth-buttons">
        <button type="button" class="oauth-btn">
          <img
            src="https://img.icons8.com/color/496/google-logo.png"
            alt="Google"
          />
          Sign up with Google
        </button>
        <button type="button" class="oauth-btn">
          <img
            src="https://img.icons8.com/color/496/linkedin.png"
            alt="LinkedIn"
          />
          Sign up with LinkedIn
        </button>
      </div>

      <div class="login-link">
        Already have an account? <a href="Login.html">Sign in here</a>
      </div>
    </div>
  </body>
</html>

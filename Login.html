<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Professional Big-sister Syster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="Styles/style.css" />
    <link rel="stylesheet" href="Styles/header/footer.css">
    <style>
      /* ========== CSS VARIABLES - SAME AS WELCOME PAGE ========== */
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
        --accent-color: #e74c3c;
        --neutral-color: #ecf0f1;
      }

      /* ========== BASE STYLES ========== */
      body {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--secondary-color) 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="3" fill="rgba(255,255,255,0.08)"/><circle cx="40" cy="80" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="60" cy="60" r="2.5" fill="rgba(255,255,255,0.09)"/></svg>');
        opacity: 0.3;
        pointer-events: none;
      }

      /* ========== LOGIN CONTAINER ========== */
      .login-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        padding: 50px 40px;
        border-radius: 20px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 450px;
        position: relative;
        z-index: 1;
        border: 1px solid rgba(255, 255, 255, 0.2);
        animation: slideInUp 0.6s ease;
      }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ========== LOGIN HEADER ========== */
      .login-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .login-logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 2rem;
        font-weight: 800;
        box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .login-header h1 {
        margin: 0 0 12px 0;
        font-size: 2rem;
        color: var(--primary);
        font-weight: 700;
      }

      .login-header p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }

      /* ========== FORM ENHANCEMENTS ========== */
      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-icon {
        position: absolute;
        left: 15px;
        color: var(--muted);
        font-size: 1rem;
        z-index: 1;
      }

      .form-group input {
        width: 100%;
        padding: 12px 12px 12px 45px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.95rem;
        transition: all 0.3s;
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
      }

      .form-group input:focus + .input-icon {
        color: var(--primary);
      }

      .password-toggle {
        position: absolute;
        right: 15px;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1rem;
        transition: color 0.3s;
        z-index: 1;
      }

      .password-toggle:hover {
        color: var(--primary);
      }

      .form-group {
        margin-bottom: 24px;
      }

      .remember-me {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        font-size: 0.9rem;
      }

      .remember-me input {
        width: auto;
      }

      .remember-me a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }

      .remember-me a:hover {
        text-decoration: underline;
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--primary-color) 100%
        );
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
      }

      .divider {
        text-align: center;
        margin: 24px 0;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 45%;
        height: 1px;
        background: var(--border);
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      .divider span {
        background: #fff;
        padding: 0 12px;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .oauth-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .oauth-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
        color: var(--text);
        font-size: 0.9rem;
      }

      .oauth-btn:hover {
        background: var(--light);
        border-color: var(--primary);
      }

      .oauth-btn img {
        width: 20px;
        height: 20px;
      }

      .signup-link {
        text-align: center;
        margin-top: 24px;
        font-size: 0.9rem;
        color: var(--text);
      }

      .signup-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }

      .signup-link a:hover {
        text-decoration: underline;
      }

      /* RESPONSIVE */
      @media (max-width: 480px) {
        .login-container {
          padding: 24px;
        }

        .login-header h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="login-logo">
          <i class="fas fa-user-graduate"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your Professional Big-sister Syster account</p>
      </div>

      <form>
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Enter your password" required />
            <button type="button" class="password-toggle">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="remember-me">
          <label> <input type="checkbox" /> Remember me </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="oauth-buttons">
        <button type="button" class="oauth-btn">
          <img
            src="https://img.icons8.com/color/496/google-logo.png"
            alt="Google"
          />
          Continue with Google
        </button>
        <button type="button" class="oauth-btn">
          <img
            src="https://img.icons8.com/color/496/linkedin.png"
            alt="LinkedIn"
          />
          Continue with LinkedIn
        </button>
      </div>

      <div class="signup-link">
        Don't have an account? <a href="Register.html">Sign up here</a>
      </div>
    </div>

    <script src="Scripts/storage.js"></script>
    <script>
      // Login functionality
      function handleLogin(event) {
        event.preventDefault();
        
        const email = document.querySelector('input[type="email"]').value;
        const password = document.querySelector('input[type="password"]').value;
        
        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }

        // Simple login simulation (in real app, this would be server validation)
        const userData = {
          name: email.split('@')[0], // Extract name from email
          email: email,
          is_logged_in: true
        };

        const result = login(userData);
        console.log('Login result:', result);
        
        alert('Login successful! Welcome back!');
        
        // Redirect to dashboard or home
        window.location.href = 'home.html';
      }

      // Check if user is already logged in
      function checkLoginStatus() {
        if (isLoggedIn()) {
          console.log('User already logged in');
          // You could redirect to dashboard
          // window.location.href = 'User dashboard.html';
        }
      }

      // Initialize when page loads
      document.addEventListener('DOMContentLoaded', function() {
        checkLoginStatus();
        
        // Add form submit handler
        const loginForm = document.querySelector('form');
        if (loginForm) {
          loginForm.addEventListener('submit', handleLogin);
        }
      });
    </script>
  </body>
</html>
